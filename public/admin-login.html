<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login | CSBC Participant Booking</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/admin-login.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">
        <img src="/logo.png" alt="Centre for Social and Behaviour Change, Ashoka University">
      </a>
      <nav aria-label="Main navigation">
        <a href="/">Booking page</a>
      </nav>
    </header>

    <main class="login-main">
      <form id="admin-login-form" class="form-panel login-panel">
        <p class="eyebrow">Admin access</p>
        <h1>Enter admin password</h1>
        <p>Use the admin password set by the CSBC research team to view participant bookings.</p>

        <label>
          Password
          <input name="password" type="password" autocomplete="current-password" required>
        </label>

        <button class="button primary" type="submit">Log in</button>
        <div id="login-message" class="message warning" hidden></div>
      </form>
    </main>
  </body>
</html>
